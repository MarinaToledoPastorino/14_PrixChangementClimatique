            tests:
              - not_null
            data_type: integer
          - name: siret
            description: "SIRET de la commune ou entité"
            tests:
              - not_null
            data_type: string
          - name: code_departement
            description: "Code du département"
            tests:
              - not_null
            data_type: string
          - name: code_insee
            description: "Code INSEE de la commune"
            tests:
              - not_null
            data_type: string
          - name: code_region
            description: "Code de la région"
            tests:
              - not_null
            data_type: string
          - name: type_compte
            description: "Type de compte (depenses, produits, primes d’assurances, dettes financières)"
            tests:
              - not_null
            data_type: string
          - name: solde_debiteur
            description: "Montant total débiteur (SD)"
            tests:
              - not_null
            data_type: float
          - name: solde_crediteur
            description: "Montant total créditeur (SC)"
            tests:
              - not_null
            data_type: float
          - name: solde
            description: "Solde net = solde_debiteur - solde_crediteur"
