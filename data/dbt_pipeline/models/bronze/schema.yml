version: 2

models:
  - name: bronze_rei
    description: >
      Données brutes REI 2022 importées depuis le fichier CSV stocké dans
      le bucket S3 du projet (pipeline_inputs). Ce modèle correspond à la
      couche bronze et ne contient aucune transformation métier.
    columns:
      - name: departement
        description: "Code du département de la commune"
      - name: direction
        description: "Code direction administrative"
      - name: commune
        description: "Code INSEE de la commune"
      - name: commune_recensee
        description: "Indique si la commune est recensée (R)"
      - name: numero_siren_epci
        description: "Numéro SIREN de l’EPCI auquel appartient la commune"
      - name: libelle_groupement
        description: "Nom du groupement intercommunal"
      - name: option_fiscale_epci
        description: "Option fiscale de l’EPCI (FPA, FPU, FPZ)"
      - name: forme_juridique_epci
        description: "Type d’EPCI (CA, CU, CC, SAN, Métropole)"
      - name: libelle_commune
        description: "Nom officiel de la commune"
      - name: fnb_commune_base_nette
        description: "Base nette FNB pour la commune"
      - name: fnb_commune_taux_net
        description: "Taux net FNB appliqué à la commune"
      - name: fnb_commune_montant_reel
        description: "Montant réel FNB pour la commune"
      - name: tafnb_commune_base_taxable_commune
        description: "Base taxable TAFNB pour la commune"
      - name: fnb_commune_taux_net
        description: "Taux net TAFNB appliqué à la commune"
      - name: tafnb_commune_montant_reel
        description: "Montant réel TAFNB pour la commune"
      - name: code_insee
        description: "Code INSEE de la commune"
  
  - name: insee_filosofi_2021
    description: >
      Données INSEE
      Principaux indicateurs sur la pauvreté en 2021 : 
      niveau de vie, taux de pauvreté, part des ménages imposés et décomposition du revenu disponible
      Sous-titre : Revenus localisés sociaux et fiscaux (Filosofi)
      Identifiant du jeu de données : DS_FILOSOFI_CC
      URL : https://catalogue-donnees.insee.fr/fr/catalogue/recherche/DS_FILOSOFI_CC
    persist_docs:
      relation: true 
      columns: true 
    columns:
      - name: geo
        description: "Exemple : 001 pour Paris, 002 pour Lyon, 144 pour Louvier, 32462 pour Vic-Fezensac..."
        type: STRING
      - name: geo_object
        description: "Type de geo : COM, BV2022"
        type: STRING
      - name: filosofi_measure
        description: "Mesures filosofi  - voir les metadonnes https://catalogue-donnees.insee.fr/fr/catalogue/recherche/DS_FILOSOFI_CC"
        type: STRING
      - name: unit_measure
        description: >
          Unité de mesure : 
          PT pour pourcentage, EUR_YR pour Euros par an, _Z pour nombre et PS pour personnes
        type: STRING
      - name: unit_mult
        description: "Quantité d'unités (en puissance de 10)"
        type: INTEGER
      - name: conf_status
        description: "Statut de confidentialité : F pour diffusable, C pour Confidentiel (obs_value sera null)"
        type: STRING
      - name: obs_status
        description: "Statut de l'observation : A pour normal, O pour valeur manquante"
        type: STRING
      - name: time_period
        description: "Periode temporelle: année - toujours 2021"
        type: INTEGER
      - name: obs_value
        description: "Valeur numérique"
        type: FLOAT

  - name: rga 
    description: >
      (DONNEES GEOGRAPHIQUES) Exposition au phénomène de retrait-gonflement des argiles(RGA) par zone géographique
      

      IMPORTANT LES DONNEES SONT EN PROJECTION LAMBERT93 (= EPSG:2154 https://epsg.io/2154)


      Source : https://www.georisques.gouv.fr/donnees/bases-de-donnees/retrait-gonflement-des-argiles-version-2026
        Fichier original Shapefile converti en Geopackage sur le S3 pour la simplicité


      Méthode de calcul et explications : https://www.georisques.gouv.fr/consulter-les-dossiers-thematiques/retrait-gonflement-des-argiles
        (dans l'onglet 'Exposition du territoire et réglementation')

    persist_docs:
      relation: true 
      columns: true 

    columns:
      - name: geom
        description: Géométrie du polygone
      - name: surf_m2
        description: Surface du polygone en m^2
      - name: niveau
        description: "Niveau d'exposition au phénomène de retrait-gonflement des argiles
          de 1(faible) à 3(fort)"
      - name: code_departement
        description: Numéro du département
      - name: gid
        description: Index des polygones

models:
  - name: ccr_main_page
    description: >
      Données scrappées de la page principale du site https://www.ccr.fr/portail-catastrophes-naturelles/liste-arretes/.
      Ces données contiennent le nombre d'arrêtés survenus sur le territoire français depuis 1982. 
      La colonne code_arrete connecte cette table à la table ccr_details. 
    columns:
      - name: nom_peril
        description: "Type de péril (Inondations, sécheresse, ect...)"
        type: STRING
      - name: dateArrete
        description: "Date officielle de l'arrêté"
        type: DATE
      - name: dateParutionJO
        description: "Date de parution au Journal Officiel"
        type: DATE
      - name: codeNOR
        description: "Code officiel d'indentification de l'arrête"
        type: STRING
      - name: codeArrete
        description: "Code d'indentification de l'arrête pour le site web (important pour le scrapping des données ccr_details)"
        type: INTEGER

models:
  - name: ccr_details
    description: >
      Données scrappées des child pages du site https://www.ccr.fr/portail-catastrophes-naturelles/liste-arretes/ (en cliquant sur l'icône en forme d'œil).
      Example: https://www.ccr.fr/detail-arrete/?codeArrete=000001
      Ces données contiennent les détails des les communes impactées par une CatNat, 
      si la arrêté a été reconnue et quel type de franchise a été appliqué.
      /!\ Les données brutes contiennent 516 doublons, ceci est une erreur du site CCR /!\
    columns:
      - name: code_geo
        description: "Code INSEE de la commune"
        type: INTEGER
      - name: nom_commune
        description: "Nom de la commune"
        type: STRING
      - name: date_debut_evenement
        description: ""
        type: DATE
      - name: date_fin_evenement
        description: ""
        type: DATE
      - name: date_arrete
        description: "Date officielle de l'arrêté"
        type: STRING
      - name: nom_peril
        description: "Type de péril/CatNat"
        type: STRING
      - name: franchise
        description: "Type de franchise (Simple, Doublée, Triplée, Quadruplée)"
        type: STRING
      - name: libelle_avis
        description: "Avis sur l'état de l'arrêté (Reconnue, Non reconnue)"
        type: STRING
      - name: codeArrete
        description: "Code d'indentification de l'arrête pour le site web (important pour le scrapping des données ccr_details)"
        type: INTEGER
        
 models:
  - name: geoportail_ccr_communes
    description: >
      Données extractes du Geoportail ArcGIS de la CCR: https://geoportail.ccr.fr/server/rest/services/CarteToutPublic
      Ces données figure sur la page Visualiser de la CCR: https://www.ccr.fr/portail-catastrophes-naturelles/visualiser/
      /!\ Les données sont sous forme de categories/classes et pas sous forme de valeur numérique /!\
      
      -- DATA --
      cout_cumul: coûts cumulés des sinistres
      cout_moy: coûts moyen des sinistres
      freq: fréquence moyenne catnat
      nb_risque: nombre de risques assurées
      prime: primes catnat
      va: valeurs assurées
      sp: ratio sinistres et primes 

      -- PERIL --
      tout: tout type de péril
        tout_ino: tout type d'inondations
          icb: inondation et/ou coulée de boue
          irn: inondation par remontées de nappes 
          sub: inondation par submersion marine
        sec: sécheresse
        mvt: mouvement de terrain
        sei: séisme
        ava: avalanche
        vcy: vent cyclonique
        aut: autres périls
        
      -- DEMOGRAPHIE --
      part: particulier
      pro: professionel/entreprises

    columns:
      - name: code_geo
        description: "Code INSEE de la commune"
        type: INTEGER
      - name: code_departement
        description: "Code du département"
        type: INTEGER
      - name: nom_commune
        description: "Nom de la commune"
        type: STRING

      # COÛTS CUMULÉS (CUMUL DES DOMMAGES)
      - name: cout_cumul_tout
        description: "Coût cumulé total tous périls confondus"
        type: FLOAT
      - name: cout_cumul_tout_ino
        description: "Coût cumulé total des inondations"
        type: FLOAT
      - name: cout_cumul_icb
        description: "Coût cumulé : Inondations et Coulées de boue"
        type: FLOAT
      - name: cout_cumul_irn
        description: "Coût cumulé : Inondations par Remontée de Nappe"
        type: FLOAT
      - name: cout_cumul_sub
        description: "Coût cumulé : Submersion marine"
        type: FLOAT
      - name: cout_cumul_sec
        description: "Coût cumulé : Sécheresse (Retrait-Gonflement des Argiles)"
        type: FLOAT
      - name: cout_cumul_mvt
        description: "Coût cumulé : Mouvements de terrain"
        type: FLOAT
      - name: cout_cumul_sei
        description: "Coût cumulé : Séismes"
        type: FLOAT
      - name: cout_cumul_ava
        description: "Coût cumulé : Avalanches"
        type: FLOAT
      - name: cout_cumul_vcy
        description: "Coût cumulé : Vents cycloniques"
        type: FLOAT
      - name: cout_cumul_aut
        description: "Coût cumulé : Autres périls (Grêle, foudre, etc.)"
        type: FLOAT

      # COÛTS MOYENS
      - name: cout_moy_tout
        description: "Coût moyen par sinistre tous périls"
        type: FLOAT
      - name: cout_moy_tout_ino
        description: "Coût moyen par sinistre : Inondations"
        type: FLOAT
      - name: cout_moy_icb
        description: "Coût moyen : Inondations et Coulées de boue"
        type: FLOAT
      - name: cout_moy_irn
        description: "Coût moyen : Inondations par Remontée de Nappe"
        type: FLOAT
      - name: cout_moy_sub
        description: "Coût moyen : Submersion marine"
        type: FLOAT
      - name: cout_moy_sec
        description: "Coût moyen : Sécheresse"
        type: FLOAT
      - name: cout_moy_mvt
        description: "Coût moyen : Mouvements de terrain"
        type: FLOAT
      - name: cout_moy_sei
        description: "Coût moyen : Séismes"
        type: FLOAT
      - name: cout_moy_ava
        description: "Coût moyen : Avalanches"
        type: FLOAT
      - name: cout_moy_vcy
        description: "Coût moyen : Vents cycloniques"
        type: FLOAT
      - name: cout_moy_aut
        description: "Coût moyen : Autres périls"
        type: FLOAT

      # FRÉQUENCES (RÉCURRENCE)
      - name: freq_tout
        description: "Nombre moyen de sinistres par an (tous périls)"
        type: STRING
      - name: freq_tout_ino
        description: "Fréquence moyenne des inondations"
        type: STRING
      - name: freq_icb
        description: "Fréquence moyenne : Inondations et Coulées de boue"
        type: STRING
      - name: freq_irn
        description: "Fréquence moyenne : Remontées de Nappe"
        type: STRING
      - name: freq_sub
        description: "Fréquence moyenne : Submersion marine"
        type: STRING
      - name: freq_sec
        description: "Fréquence moyenne : Sécheresse"
        type: STRING
      - name: freq_mvt
        description: "Fréquence moyenne : Mouvements de terrain"
        type: STRING
      - name: freq_sei
        description: "Fréquence moyenne : Séismes"
        type: STRING
      - name: freq_ava
        description: "Fréquence moyenne : Avalanches"
        type: STRING
      - name: freq_vcy
        description: "Fréquence moyenne : Vents cycloniques"
        type: STRING
      - name: freq_aut
        description: "Fréquence moyenne : Autres périls"
        type: STRING

      # EXPOSITION (RISQUES ET PRIMES)
      - name: nb_risque_part
        description: "Nombre de contrats d'assurance Particuliers"
        type: STRING
      - name: nb_risque_pro
        description: "Nombre de contrats d'assurance Professionnels / Entreprises"
        type: STRING
      - name: nb_risque_tot
        description: "Nombre total de risques assurés"
        type: STRING
      - name: prime_part
        description: "Primes CatNat encaissées (Particuliers)"
        type: FSTRINGT
      - name: prime_pro
        description: "Primes CatNat encaissées (Professionnels)"
        type: STRING
      - name: prime_tot
        description: "Primes CatNat totales"
        type: STRING
      - name: va_part
        description: "Valeur Assurée : Particuliers"
        type: STRING
      - name: va_pro
        description: "Valeur Assurée : Professionnels"
        type: STRING
      - name: va_tot
        description: "Valeur Assurée Totale"
        type: STRING

      # RATIO S/P (RENTABILITÉ TECHNIQUE)
      - name: sp_tout
        description: "Ratio Sinistres / Primes Global"
        type: STRING
      - name: sp_tout_ino
        description: "Ratio S/P pour les inondations"
        type: STRING
      - name: sp_icb
        description: "Ratio S/P pour Inondations et Coulées de boue"
        type: STRING
      - name: sp_irn
        description: "Ratio S/P pour Remontées de Nappe"
        type: STRING
      - name: sp_sub
        description: "Ratio S/P pour Submersion marine"
        type: STRING
      - name: sp_sec
        description: "Ratio S/P pour Sécheresse"
        type: STRING
      - name: sp_mvt
        description: "Ratio S/P pour Mouvements de terrain"
        type: STRING
      - name: sp_sei
        description: "Ratio S/P pour Séismes"
        type: STRING
      - name: sp_ava
        description: "Ratio S/P pour Avalanches"
        type: STRING
      - name: sp_vcy
        description: "Ratio S/P pour Vents cycloniques"
        type: STRING
      - name: sp_aut
        description: "Ratio S/P pour les autres périls"
        type: STRING
   
   
