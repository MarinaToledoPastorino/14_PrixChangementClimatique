  - name: pprm_gaspar
    description: |-
      1. Définition - 
      Le plan de prévention des risques miniers est un document réalisé 
      par l’État qui réglemente l'utilisation des sols en fonction des risques 
      miniers auxquels ils sont soumis. Cette réglementation va de l'interdiction
       de construire à la possibilité de construire sous certaines conditions.

      2. Structure
      Chaque procédure est décrite par une ligne par commune et par risque traité.
      La table comprend les procédures en vigueur, les procédures en cours, les 
      procédures annulées, abrogées et déprescrites, ainsi que les procédures
       révisées par une autre procédure.

      3. Dictionnaire de données (erreur) -  
      https://www.georisques.gouv.fr/sites/default/files/Georisques_DictionnaireDonneesGaspar_1.0.pdf 
    columns:
      - name: code_geo
        description: Code commune sous le format code géographique à 5 chiffres (ex 75056 pour Paris)
        type: VARCHAR


  - name: dicrim_gaspar
    description: |-
      1. Définition -
      Le document d’information communal sur les risques majeurs (DICRIM) recense
       les mesures de sauvegarde répondant aux risques naturels et technologiques majeurs 
       sur le territoire de la commune, conformément au décret du 11 octobre 1990.
      http://www.georisques.gouv.fr/articles/le-document-dinformation-communal-sur-les-risquesmajeurs-dicrim

      2. Structure -
      Un DICRIM par commune (identification et suppression des doublons en cours).

      3. Dictionnaire de données - 
      https://www.georisques.gouv.fr/sites/default/files/Georisques_DictionnaireDonneesGaspar_1.0.pdf

      4. Nota - données incomplètes par rapport au dictionnaire
    columns:
      - name: cod_commune
        description: Code de la commune concernée
        data_type: varchar
      - name: lib_commune
        description: Nom de la commune concernée
        data_type: varchar
      - name: dat_publi_dicrim
        description: Date de publication
        data_type: timestamp



  - name: pprn_gaspar
