  - name: recensement_hors_com
    description: >
      Séries historiques en 2022 - Données hors collectivités d'outre-mer -
      Recensement de la population - Base des principaux indicateurs -
      Les deux bases fournissent des résultats sur les naissances, les décès, la population, les résidences principales,
      les résidences secondaires et logements occasionnels, les caractéristiques des personnes des ménages.
      Les données sont diffusées selon la géographie en vigueur au 1er janvier 2025.
      Niveau géographique : commune, arrondissement municipal.
      Résultats : les indicateurs sont disponibles pour 1968, 1975, 1982, 1990, 1999, 2006, 2011, 2016 et 2022.
      https://www.insee.fr/fr/statistiques/8582555
