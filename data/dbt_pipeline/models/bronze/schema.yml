  - name: catnat_gaspar
    description: |-
      1. Définition -
      Les arrêtés interministériels de reconnaissances de l’état de catastrophe naturelle sont
      délivrés pour un ensemble de communes, un aléa et une période donnée, après examen des
      demandes de reconnaissance déposées par les maires des communes concernées.
      http://www.georisques.gouv.fr/articles/guide-juridique-indemnisation-des-castastrophesnaturelles

      2. Structure -
      Une ligne correspond à une reconnaissance, qui concerne une commune, un événement
      (date de début et de fin) et un risque. On peut avoir plusieurs reconnaissances sur une
      même commune pour un même événement (ex : tempête et inondation).

      3. Dictionnaire données -
      https://www.georisques.gouv.fr/sites/default/files/Georisques_DictionnaireDonneesGaspar_1.0.pdf
    columns:
      - name: cod_nat_catnat
        description: |-
          Code unique identifiant une reconnaissance (code national généré par
          Gaspar)
        data_type: varchar
      - name: cod_commune
        description: Code de la commune concernée
        data_type: varchar
      - name: lib_commune
        description: Nom de la commune concernée
        data_type: varchar
      - name: num_risque_jo
        description: Numéro du risque mentionné
        data_type: varchar
      - name: lib_risque_jo
        description: Libellé du risque mentionné dans le journal officiel
        data_type: varchar
      - name: dat_deb
        description: Date de début de l’événement
        data_type: date
      - name: dat_fin
        description: Date de fin de l’événement
        data_type: date
      - name: dat_pub_arrete
        description: Date de l’arrêté
        data_type: date
      - name: dat_pub_jo
        description: Date de publication au journal officiel
        data_type: date
      - name: dat_maj
        description: Date de mise à jour de la fiche GASPAR
        data_type: timestamp

  - name: tim_gaspar
    description: |-
      1. Définition -
      Le dossier de transmission des informations au maire (TIM) a remplacé le dossier communal synthétique (DCS) et le porté à connaissance (PAC-risques). Il contient les informations nécessaires à la réalisation de l’information préventive sur leur territoire et notamment du DICRIM (Document d’Information Communal sur les Risques Majeurs).
      http://www.georisques.gouv.fr/articles/le-dossier-departemental-sur-les-risques-majeurs-ddrm

      2. Structure - 
      Chaque transmission est décrite par une ligne par risque y figurant. Une transmission es dans la plupart des cas monocommunale, à quelques rares exceptions près : transmissions spécifiques sur un risque à un ensemble de communes (sismique, canalisations de matières dangereuses…).

      3. Dictionnaire de données -
    columns:
      - name: codeInsee
        data_type: varchar
        quote: true
      - name: nomCommune
        data_type: varchar
        quote: true
      - name: dateDebutEvenement
        data_type: date
        quote: true
      - name: dateFinEvenement
        data_type: date
        quote: true
      - name: dateArrete
        data_type: date
        quote: true
      - name: dateParutionJO
        data_type: date
        quote: true
      - name: nomPeril
        data_type: varchar
        quote: true
      - name: franchise
        data_type: varchar
      - name: libelleAvis
        data_type: varchar
        quote: true
      - name: code_arrete
        data_type: bigint


  - name: risq_gaspar
    description: |-
      1. Définition -
        Le DDRM (le Dossier Départemental sur les Risques Majeurs) est un document où le préfet
        (Conformément à l’article R125-11 du Code de l’Environnement) consigne toutes les
        informations essentielles sur les risques naturels et technologiques majeurs au niveau de
        son département, ainsi que sur les mesures de prévention et de sauvegarde prévues pour
        limiter leurs effets. En précisant les notions d'aléa et de risque majeur, le DDRM doit
        recenser toutes les communes à risques du département, dans lesquelles une information
        préventive des populations doit être réalisée.
        http://www.georisques.gouv.fr/articles/le-dossier-departemental-sur-les-risques-majeurs-ddrm

      2. Structure - 
        Chaque commune est décrite par une ligne par risque recensé

      3. Dictionnaire de données - https://www.georisques.gouv.fr/sites/default/files/Georisques_DictionnaireDonneesGaspar_1.0.pdf

    columns:
      - name: cod_commune
        description: Code de la commune concernée
        type: VARCHAR
      - name: lib_commune
        description: Nom de la commune concernée
        type: VARCHAR
      - name: num_risque
        description: Numéro du risque mentionné dans le DDRM
        type: INT
      - name: lib_risque
        description: Libellé du risque mentionné dans le DDRM
        type: VARCHAR

  
